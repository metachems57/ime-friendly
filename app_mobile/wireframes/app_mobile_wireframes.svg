    <rect x="24" y="182" width="342" height="146" rx="16" fill="#FFFFFF" stroke="#D8E1EE"/>
    <text x="38" y="212" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#142235">Titre article</text>
    <text x="38" y="236" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Education • 07/05/2026</text>
    <text x="38" y="270" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Extrait du contenu sur 3 lignes max...</text>
    <rect x="24" y="342" width="342" height="146" rx="16" fill="#FFFFFF" stroke="#D8E1EE"/>
    <rect x="24" y="502" width="342" height="146" rx="16" fill="#FFFFFF" stroke="#D8E1EE"/>
    <rect x="0" y="752" width="390" height="92" rx="20" fill="#FFFFFF" stroke="#D8E1EE"/>
  </g>

  <!-- Screen 5 Messages -->
  <g transform="translate(1880,100)">
    <rect width="390" height="844" rx="24" ry="24" fill="#FFFFFF" stroke="#CBD7E7"/>
    <rect x="0" y="0" width="390" height="92" rx="24" fill="#E7F0FD"/>
    <text x="24" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#142235">Messagerie</text>
    <rect x="24" y="112" width="342" height="58" rx="14" fill="#FFFFFF" stroke="#D8E1EE"/>
    <text x="38" y="147" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Notifications (3)</text>
    <rect x="24" y="184" width="342" height="100" rx="14" fill="#FFFFFF" stroke="#D8E1EE"/>
    <rect x="24" y="296" width="342" height="100" rx="14" fill="#FFFFFF" stroke="#D8E1EE"/>
    <rect x="24" y="408" width="342" height="100" rx="14" fill="#FFFFFF" stroke="#D8E1EE"/>
    <rect x="24" y="528" width="342" height="200" rx="16" fill="#F7FAFF" stroke="#D8E1EE"/>
    <text x="38" y="560" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Zone chat active</text>
    <rect x="0" y="752" width="390" height="92" rx="20" fill="#FFFFFF" stroke="#D8E1EE"/>
  </g>

  <!-- Screen 6 Profil -->
  <g transform="translate(2340,100)">
    <rect width="390" height="844" rx="24" ry="24" fill="#FFFFFF" stroke="#CBD7E7"/>
    <rect x="0" y="0" width="390" height="92" rx="24" fill="#EAF7F4"/>
    <text x="24" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#142235">Mon profil</text>
    <circle cx="195" cy="170" r="56" fill="#E7F0FD"/>
    <text x="195" y="176" text-anchor="middle" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#1F63B5">Photo</text>
    <text x="195" y="252" text-anchor="middle" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#142235">Nom utilisateur</text>
    <text x="195" y="280" text-anchor="middle" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Administrateur</text>
    <rect x="24" y="314" width="342" height="52" rx="12" fill="#FFFFFF" stroke="#D8E1EE"/>
    <text x="38" y="346" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Modifier profil</text>
    <rect x="24" y="378" width="342" height="52" rx="12" fill="#FFFFFF" stroke="#D8E1EE"/>
    <text x="38" y="410" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Changer mot de passe</text>
    <rect x="24" y="442" width="342" height="52" rx="12" fill="#FFFFFF" stroke="#D8E1EE"/>
    <text x="38" y="474" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Gestion administrateur</text>
    <rect x="24" y="520" width="342" height="132" rx="16" fill="#F7FAFF" stroke="#D8E1EE"/>
    <text x="38" y="552" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Mes favoris</text>
    <rect x="0" y="752" width="390" height="92" rx="20" fill="#FFFFFF" stroke="#D8E1EE"/>
  </g>

  <!-- Row 2 header -->
  <text x="40" y="1030" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#142235">Prototype flow (resume)</text>
  <rect x="40" y="1060" width="2730" height="340" rx="18" fill="#FFFFFF" stroke="#CBD7E7"/>
  <text x="70" y="1120" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#142235">Auth: Splash -> Login -> Signup -> (valide) Home</text>
  <text x="70" y="1160" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#142235">Home -> Reseau / Blog / Outils / Messages / Profil (bottom nav)</text>
  <text x="70" y="1200" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#142235">Reseau/Blog/Outils -> Detail -> Commentaires -> Notification -> Messages</text>
  <text x="70" y="1240" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#142235">Profil Admin -> Gestion admin -> Validation comptes / moderation / reset mdp</text>
  <text x="70" y="1300" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#4F627A">Astuce: duplique ces wireframes dans Penpot puis transforme en UI finale avec les tokens.</text>
</svg>

