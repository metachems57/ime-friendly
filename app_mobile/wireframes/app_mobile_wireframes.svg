    <text x="130" y="225" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#142235">Titre post</text>
    <text x="130" y="250" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Auteur • date</text>
    <text x="38" y="330" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Actions: Like • Commenter • Ouvrir</text>
    <rect x="24" y="378" width="342" height="180" rx="16" fill="#FFFFFF" stroke="#D8E1EE"/>
    <rect x="24" y="670" width="342" height="58" rx="16" fill="#1F63B5"/>
    <text x="195" y="707" text-anchor="middle" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#FFFFFF">+ Creer un post</text>
    <rect x="0" y="752" width="390" height="92" rx="20" fill="#FFFFFF" stroke="#D8E1EE"/>
  </g>

  <!-- Screen 4 Blog -->
  <g transform="translate(1420,100)">
    <rect width="390" height="844" rx="24" ry="24" fill="#FFFFFF" stroke="#CBD7E7"/>
    <rect x="0" y="0" width="390" height="92" rx="24" fill="#EDF0F6"/>
    <text x="24" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#142235">Blog</text>
    <rect x="24" y="114" width="342" height="52" rx="12" fill="#FFFFFF" stroke="#D8E1EE"/>
