    <text x="24" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#142235">Accueil</text>
    <circle cx="352" cy="46" r="14" fill="#F05A7E"/>
    <text x="352" y="51" text-anchor="middle" font-size="11" font-family="Segoe UI, Arial, sans-serif" fill="#FFF">2</text>
    <rect x="24" y="118" width="342" height="128" rx="16" fill="#F7FAFF" stroke="#D8E1EE"/>
    <text x="38" y="148" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#142235">Vie de l'IME</text>
    <text x="38" y="176" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Derniers posts intervenants</text>
    <rect x="24" y="266" width="164" height="106" rx="14" fill="#FFF7EC" stroke="#EFD3A6"/>
    <rect x="202" y="266" width="164" height="106" rx="14" fill="#EEF8F3" stroke="#CAE8DA"/>
    <rect x="24" y="386" width="164" height="106" rx="14" fill="#F3F0FF" stroke="#D8D0F3"/>
    <rect x="202" y="386" width="164" height="106" rx="14" fill="#FFEFF5" stroke="#F1CFDF"/>
    <rect x="24" y="512" width="342" height="130" rx="16" fill="#F7FAFF" stroke="#D8E1EE"/>
    <text x="38" y="542" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#142235">Agenda</text>
    <rect x="0" y="752" width="390" height="92" rx="20" fill="#FFFFFF" stroke="#D8E1EE"/>
    <text x="35" y="806" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#1F63B5">Accueil</text>
    <text x="110" y="806" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Reseau</text>
    <text x="185" y="806" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Outils</text>
    <text x="258" y="806" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Blog</text>
    <text x="334" y="806" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Profil</text>
  </g>

