<svg xmlns="http://www.w3.org/2000/svg" width="2820" height="1960" viewBox="0 0 2820 1960">
  <rect width="2820" height="1960" fill="#EEF3FA"/>
  <text x="40" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#142235">IME-Friendly - Wireframes mobile (390x844)</text>

  <!-- Row 1 -->
  <!-- Screen 1 Login -->
  <g transform="translate(40,100)">
    <rect width="390" height="844" rx="24" ry="24" fill="#FFFFFF" stroke="#CBD7E7"/>
    <text x="24" y="56" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#142235">Connexion</text>
    <rect x="24" y="140" width="342" height="56" rx="12" fill="#F7FAFF" stroke="#D8E1EE"/>
    <text x="38" y="174" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Email</text>
    <rect x="24" y="212" width="342" height="56" rx="12" fill="#F7FAFF" stroke="#D8E1EE"/>
    <text x="38" y="246" font-size="14" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Mot de passe</text>
    <rect x="24" y="292" width="342" height="52" rx="14" fill="#1F63B5"/>
    <text x="195" y="325" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#FFFFFF">Se connecter</text>
    <text x="24" y="386" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#1F63B5">Mot de passe oublie</text>
    <text x="24" y="420" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#4F627A">Pas de compte ? Inscription</text>
  </g>

  <!-- Screen 2 Home -->
  <g transform="translate(500,100)">
